<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Content Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

    <style>
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .animate-fade-in{animation:fadeIn .4s ease-out}
        .dark-scroll::-webkit-scrollbar{height:6px;width:6px}
        .dark-scroll::-webkit-scrollbar-track{background:transparent}
        .dark-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
        .dark-scroll{scrollbar-width:thin;scrollbar-color:#334155 transparent}

        .light-scroll::-webkit-scrollbar{height:6px;width:6px}
        .light-scroll::-webkit-scrollbar-track{background:transparent}
        .light-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        .light-scroll{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}

        .console-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease-out,opacity .25s ease-out;opacity:0}
        .console-wrap.open{grid-template-rows:1fr;opacity:1}
        .console-inner{overflow:hidden}

        input[type=range].scale-slider{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer}
        input[type=range].scale-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer}
        input[type=range].scale-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;cursor:pointer;border:none}
        .dark input[type=range].scale-slider{background:#334155}
        .dark input[type=range].scale-slider::-webkit-slider-thumb{background:#10b981}
        .dark input[type=range].scale-slider::-moz-range-thumb{background:#10b981}
        html:not(.dark) input[type=range].scale-slider{background:#cbd5e1}
        html:not(.dark) input[type=range].scale-slider::-webkit-slider-thumb{background:#059669}
        html:not(.dark) input[type=range].scale-slider::-moz-range-thumb{background:#059669}

        html.dark, html.dark body { background:#020617 !important; color:#f1f5f9 !important; color-scheme: dark; }
        html.dark table { color:#e2e8f0; }
        html.dark table td { color:inherit; }
        html.dark table th { color:#94a3b8; }
    </style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    const LS_P = 'yt-dashboard-prefs';
    const lp = () => { try { return JSON.parse(localStorage.getItem(LS_P)) || {}; } catch { return {}; } };
    const sp = p => { try { localStorage.setItem(LS_P, JSON.stringify(p)); } catch {} };

    const sliderToScale = v => 0.7 + (v / 100) * 0.8;
    const DEFAULT_SCALE_SLIDER = 50;

    const Pill = ({ value, options, onChange, dark }) => (
        <div className={`flex-shrink-0 flex items-center rounded-lg p-0.5 border ${dark ? 'bg-slate-800 border-slate-700' : 'bg-slate-100 border-slate-200'}`}>
            {options.map(opt => {
                const k = typeof opt === 'string' ? opt : opt.k;
                const l = typeof opt === 'string' ? opt : opt.l;
                return (
                    <button key={k} onClick={() => onChange(k)}
                            className={`px-2.5 py-1 rounded-md text-xs font-bold transition-all ${value === k ? 'bg-emerald-500 text-white shadow-sm' : dark ? 'text-slate-400 hover:text-slate-200' : 'text-slate-500 hover:text-slate-700'}`}>
                        {l}
                    </button>
                );
            })}
        </div>
    );

    const App = () => {
        const prefs = useMemo(() => lp(), []);

        const [apiKey, setApiKey] = useState(prefs.apiKey || '');
        const [channelUrl, setChannelUrl] = useState(prefs.channelUrl || 'https://www.youtube.com/@InnerCircleTrader');
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [dark, setDark] = useState(prefs.dark !== false);
        const [scaleSlider, setScaleSlider] = useState(prefs.scaleSlider ?? DEFAULT_SCALE_SLIDER);
        const [filter, setFilter] = useState('All');
        const [videos, setVideos] = useState(null);
        const [showSettings, setShowSettings] = useState(!prefs.apiKey);
        const [logs, setLogs] = useState([]);

        const scale = sliderToScale(scaleSlider);
        const log = msg => setLogs(p => [...p.slice(-19), msg]);

        useEffect(() => {
            sp({ apiKey, channelUrl, dark, scaleSlider });
        }, [apiKey, channelUrl, dark, scaleSlider]);

        useEffect(() => {
            document.documentElement.classList.toggle('dark', dark);
            const bg = dark ? '#020617' : '#f8fafc';
            const text = dark ? '#f1f5f9' : '#0f172a';
            document.documentElement.style.backgroundColor = bg;
            document.documentElement.style.color = text;
            document.body.style.backgroundColor = bg;
            document.body.style.color = text;
        }, [dark]);

        const extractUsername = (url) => {
            const match = url.match(/@([a-zA-Z0-9_\-\.]+)/);
            return match ? match[1] : url.trim();
        };

        const handleFetch = async () => {
            if (!apiKey.trim()) {
                setError("Google API Key is required. Please check settings.");
                setShowSettings(true);
                return;
            }
            if (!channelUrl.trim()) return;

            setLoading(true);
            setError(null);
            setVideos(null);
            setLogs([]);

            const handle = extractUsername(channelUrl);
            log(`🔍 Resolving channel handle: @${handle}`);

            try {
                const channelSearchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(handle)}&key=${apiKey}`;
                const chRes = await fetch(channelSearchUrl);
                if (!chRes.ok) throw new Error(`API Error (Handle Resolution). Status: ${chRes.status}`);
                const chData = await chRes.json();

                if (!chData.items || chData.items.length === 0) {
                    throw new Error(`No channel found for handle: @${handle}`);
                }

                const channelId = chData.items[0].id.channelId;
                const channelTitle = chData.items[0].snippet.title;
                log(`✅ Found Channel: "${channelTitle}" (ID: ${channelId})`);

                log(`📥 Querying YouTube Data API engine...`);
                const searchVideosUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=50&order=date&type=video&key=${apiKey}`;
                const vRes = await fetch(searchVideosUrl);
                if (!vRes.ok) throw new Error(`YouTube API Fetch Error. Status: ${vRes.status}`);
                const vData = await vRes.json();

                if (!vData.items) throw new Error("Invalid API response format structure.");

                const processed = vData.items.map(item => {
                    const title = item.snippet.title;
                    const isLive = item.snippet.liveBroadcastContent === 'live' || item.snippet.liveBroadcastContent === 'upcoming';

                    let type = isLive ? 'Live' : 'Video';
                    if (title.toLowerCase().includes('#shorts') || title.toLowerCase().includes('shorts')) {
                        type = 'Shorts';
                    }

                    return {
                        datetime: item.snippet.publishedAt,
                        type,
                        name: title,
                        url: `https://www.youtube.com/watch?v=${item.id.videoId}`
                    };
                });

                log(`✅ Loaded ${processed.length} entries successfully.`);
                setVideos(processed);
            } catch (err) {
                log(`❌ Exception: ${err.message}`);
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };

        const filteredVideos = useMemo(() => {
            if (!videos) return [];
            if (filter === 'All') return videos;
            return videos.filter(v => v.type === filter);
        }, [videos, filter]);

        const getBadgeStyle = type => {
            if (type === 'Live') return dark ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-red-50 text-red-700 border-red-200';
            if (type === 'Shorts') return dark ? 'bg-purple-500/10 text-purple-400 border-purple-500/20' : 'bg-purple-50 text-purple-700 border-purple-200';
            return dark ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 'bg-blue-50 text-blue-700 border-blue-200';
        };

        const formatDate = isoStr => {
            return new Date(isoStr).toLocaleString('en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false
            });
        };

        const bg = dark ? 'bg-slate-950/95 text-slate-100' : 'bg-white/95 text-slate-900';
        const bdr = dark ? 'border-slate-800' : 'border-slate-200';
        const card = dark ? 'bg-slate-800 border-slate-600 text-slate-100' : 'bg-white border-slate-200 text-slate-900 shadow-sm';
        const inp = dark ? 'bg-slate-800 border-slate-700 text-emerald-400' : 'bg-slate-50 border-slate-300 text-emerald-700';
        const mt = dark ? 'text-slate-400' : 'text-slate-500';
        const t1 = dark ? 'text-slate-100' : 'text-slate-800';
        const sB = dark ? 'bg-slate-800' : 'bg-white';
        const hR = dark ? 'hover:bg-slate-700/20' : 'hover:bg-slate-50';
        const scCls = dark ? 'dark-scroll' : 'light-scroll';

        const tblFs = `${Math.round(14 * scale)}px`;
        const tblHFs = `${Math.round(11 * scale)}px`;
        const tblCellPy = `${Math.round(10 * scale)}px`;

        return (
            <React.Fragment>
                {/* Navbar */}
                <div className={`sticky top-0 z-50 ${bg} backdrop-blur-md border-b ${bdr}`}>
                    <div className="px-4 xl:px-8">
                        <div className="flex items-center gap-3 py-3">
                            <button
                                onClick={() => setShowSettings(!showSettings)}
                                className={`flex-shrink-0 text-xs px-2 py-1.5 rounded transition-colors ${showSettings ? (dark ? 'bg-slate-700 text-slate-300' : 'bg-slate-200 text-slate-600') : (dark ? 'text-slate-600 hover:text-slate-400' : 'text-slate-400 hover:text-slate-600')}`}
                                title="Toggle API Settings Guide"
                            >
                                ⚙️ Settings
                            </button>
                            <div className="flex gap-1.5 flex-shrink-0">
                                <div className={`h-2.5 w-2.5 rounded-full ${apiKey ? 'bg-emerald-500' : 'bg-red-500'}`} title={apiKey ? "API Key Configured" : "API Key Missing"}/>
                            </div>

                            <div className="flex-1 min-w-0">
                                <input
                                    type="text"
                                    value={channelUrl}
                                    onChange={e => setChannelUrl(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleFetch()}
                                    placeholder="YouTube Channel link or handle (@InnerCircleTrader)..."
                                    className={`w-full ${inp} border rounded-lg px-3 py-2 font-mono font-medium text-sm focus:outline-none focus:border-emerald-500 transition-colors`}
                                />
                            </div>

                            <button
                                onClick={handleFetch}
                                disabled={loading}
                                className="flex-shrink-0 flex items-center bg-emerald-500 hover:bg-emerald-400 text-white font-bold px-4 py-2 rounded-lg text-sm transition-all active:scale-95 disabled:opacity-40"
                            >
                                {loading ? (
                                    <div className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"/>
                                ) : (
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor" className="w-4 h-4">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                                    </svg>
                                )}
                            </button>

                            <button onClick={() => setDark(!dark)} className={`flex-shrink-0 text-sm px-2 py-1.5 rounded transition-colors ${dark ? 'text-yellow-400 hover:text-yellow-300' : 'text-slate-500 hover:text-slate-700'}`}>
                                {dark ? '☀' : '🌙'}
                            </button>

                            {videos && (
                                <Pill value={filter} options={['All', 'Video', 'Live', 'Shorts']} onChange={setFilter} dark={dark} />
                            )}
                        </div>

                        {/* Console Logs Wrapper */}
                        <div className={`console-wrap ${logs.length > 0 ? 'open' : ''}`}>
                            <div className="console-inner">
                                <div className="pb-2 -mt-1">
                                    <div className={`${dark ? 'bg-slate-950 border-slate-800' : 'bg-slate-100 border-slate-200'} border rounded-lg px-3 py-1.5 font-mono text-[11px] overflow-x-auto whitespace-nowrap ${scCls}`}>
                                        {logs.map((l, i) => (
                                            <span key={i}>
                                                {i > 0 && <span className={dark ? 'text-slate-700' : 'text-slate-300'}> · </span>}
                                                <span className={l.startsWith('✅') ? 'text-emerald-500' : l.startsWith('❌') ? 'text-red-500' : mt}>{l}</span>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                {/* Content Workspace */}
                <div className="px-4 xl:px-8 py-6">
                    {/* Multi-scenario Setup Guideline */}
                    {showSettings && (
                        <div className={`${card} border rounded-xl p-5 mb-6 text-sm max-w-3xl mx-auto space-y-6 animate-fade-in`}>
                            <h3 className="font-bold text-base flex items-center gap-2 border-b pb-2 border-slate-700/40">📋 How to configure YouTube Data API Datastore</h3>

                            <div className="grid md:grid-cols-2 gap-6">
                                {/* Scenario A */}
                                <div className="space-y-2">
                                    <h4 className="font-bold text-emerald-500 text-xs uppercase tracking-wider">A) If reusing your current open project panel</h4>
                                    <ol className="list-decimal pl-4 space-y-1 text-xs text-slate-400">
                                        <li>You are currently inside the <strong>"Create API key"</strong> side drawer of <code>google-sheets-store</code>.</li>
                                        <li>Ensure <strong>"Select API restrictions"</strong> dropdown is set to restriction and <strong className={t1}>YouTube Data API v3</strong> is checked.</li>
                                        <li>Keep <strong>Application restrictions</strong> set to <strong className={t1}>"None"</strong>.</li>
                                        <li>Click the blue <strong className="text-emerald-500">"Create"</strong> button at the bottom of the drawer.</li>
                                        <li>Copy the newly generated string token and paste it below.</li>
                                    </ol>
                                </div>

                                {/* Scenario B */}
                                <div className="space-y-2">
                                    <h4 className="font-bold text-blue-400 text-xs uppercase tracking-wider">B) If starting from absolute scratch</h4>
                                    <ol className="list-decimal pl-4 space-y-1 text-xs text-slate-400">
                                        <li>Go to <a href="https://console.cloud.google.com" target="_blank" rel="noreferrer" className="text-blue-400 hover:underline">console.cloud.google.com</a> and provision a brand new project space.</li>
                                        <li>Search <em>"YouTube Data API v3"</em> inside the top console search field and click <strong>Enable</strong>.</li>
                                        <li>Navigate to <strong>APIs & Services</strong> &gt; <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noreferrer" className="text-blue-400 hover:underline">Credentials</a> workspace dashboard.</li>
                                        <li>Click <strong>Create Credentials</strong> &gt; <strong>API Key</strong>.</li>
                                        <li>Apply API restrictions to restrict access specifically to YouTube Data API v3, then copy your generated key token below.</li>
                                    </ol>
                                </div>
                            </div>

                            <div className="pt-2 border-t border-slate-700/40">
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Your Google API Key</label>
                                <input
                                    type="password"
                                    value={apiKey}
                                    onChange={e => setApiKey(e.target.value)}
                                    placeholder="AIzaSy..."
                                    className={`w-full ${inp} border rounded-lg px-3 py-2 font-mono text-xs focus:outline-none focus:border-emerald-500 transition-colors`}
                                />
                            </div>
                        </div>
                    )}

                    {error && (
                        <div className="bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-3 rounded-xl mb-6 text-sm flex items-start gap-2 animate-fade-in max-w-3xl mx-auto">
                            <span className="flex-shrink-0 mt-0.5">✕</span>
                            <span className="flex-1">{error}</span>
                        </div>
                    )}

                    {/* Table Asset Index */}
                    {videos && !loading && (
                        <div className="space-y-6 animate-fade-in">
                            <div className={`${card} border rounded-xl overflow-hidden shadow-lg`}>
                                <div className={`px-4 py-3 border-b ${dark ? 'border-slate-700/50' : 'border-slate-200'} bg-gradient-to-r ${dark ? 'from-slate-900/30 to-slate-900/10' : 'from-slate-50 to-slate-100/50'} flex items-center justify-between gap-4`}>
                                    <h3 className="font-bold text-emerald-500" style={{ fontSize: `${Math.round(16 * scale)}px` }}>
                                        📋 Channel Inventory Index ({filteredVideos.length})
                                    </h3>
                                    <div className="flex items-center gap-2 flex-shrink-0">
                                        <span className={`text-[10px] ${mt}`}>A</span>
                                        <input
                                            type="range" min="0" max="100" value={scaleSlider}
                                            onChange={e => setScaleSlider(Number(e.target.value))}
                                            className="scale-slider w-20" title={`Scale: ${Math.round(scale * 100)}%`}
                                        />
                                        <span className={`text-xs font-bold ${mt}`}>A</span>
                                    </div>
                                </div>

                                {/* Desktop Table Layout */}
                                <div className={`hidden md:block overflow-x-auto ${scCls}`}>
                                    <table className="w-full text-left border-collapse" style={{ fontSize: tblFs }}>
                                        <thead>
                                        <tr className={dark ? 'bg-slate-900/50' : 'bg-slate-50'}>
                                            <th className={`px-4 sticky left-0 z-10 ${sB} font-semibold uppercase tracking-wider ${mt}`} style={{ fontSize: tblHFs, paddingTop: tblCellPy, paddingBottom: tblCellPy }}>Datetime</th>
                                            <th className={`px-4 font-semibold uppercase tracking-wider ${mt}`} style={{ fontSize: tblHFs, paddingTop: tblCellPy, paddingBottom: tblCellPy }}>Type</th>
                                            <th className={`px-4 font-semibold uppercase tracking-wider ${mt}`} style={{ fontSize: tblHFs, paddingTop: tblCellPy, paddingBottom: tblCellPy }}>Name</th>
                                            <th className={`px-4 text-right font-semibold uppercase tracking-wider ${mt}`} style={{ fontSize: tblHFs, paddingTop: tblCellPy, paddingBottom: tblCellPy }}>URL</th>
                                        </tr>
                                        </thead>
                                        <tbody className={`divide-y ${dark ? 'divide-slate-700/30' : 'divide-slate-100'}`}>
                                        {filteredVideos.map((v, i) => (
                                            <tr key={i} className={`${hR} transition-colors`}>
                                                <td className={`px-4 font-mono ${mt} sticky left-0 z-10 ${sB} whitespace-nowrap`} style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                    {formatDate(v.datetime)}
                                                </td>
                                                <td className="px-4 whitespace-nowrap" style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                        <span className={`px-2 py-0.5 text-[11px] font-bold border rounded-md ${getBadgeStyle(v.type)}`}>
                                                            {v.type}
                                                        </span>
                                                </td>
                                                <td className={`px-4 font-medium ${t1} truncate max-w-md`} style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }} title={v.name}>
                                                    {v.name}
                                                </td>
                                                <td className="px-4 text-right whitespace-nowrap" style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                    <a href={v.url} target="_blank" rel="noreferrer" className="text-emerald-500 hover:text-emerald-400 font-bold transition-colors">
                                                        Open ↗
                                                    </a>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredVideos.length === 0 && (
                                            <tr>
                                                <td colSpan="4" className={`text-center py-8 ${mt}`}>No assets matching search configurations.</td>
                                            </tr>
                                        )}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Responsive Mobile Layout Cards */}
                                <div className="block md:hidden p-4 space-y-3">
                                    {filteredVideos.map((v, i) => (
                                        <div key={i} className={`border rounded-xl p-4 ${dark ? 'bg-slate-900/40 border-slate-700/60' : 'bg-slate-50 border-slate-200'} space-y-2`}>
                                            <div className="flex items-center justify-between gap-2">
                                                <span className={`px-2 py-0.5 text-[10px] font-bold border rounded-md ${getBadgeStyle(v.type)}`}>
                                                    {v.type}
                                                </span>
                                                <span className="text-[11px] font-mono opacity-60">{formatDate(v.datetime)}</span>
                                            </div>
                                            <h4 className={`font-semibold text-sm ${t1} line-clamp-2`}>{v.name}</h4>
                                            <div className="pt-2">
                                                <a href={v.url} target="_blank" rel="noreferrer"
                                                   className="w-full text-center bg-emerald-500 hover:bg-emerald-400 text-white text-xs py-2 rounded-lg font-bold block transition-all">
                                                    Watch on YouTube ↗
                                                </a>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className={`text-center py-20 ${mt} flex items-center justify-center gap-3`}>
                            <div className="animate-spin h-5 w-5 border-2 border-emerald-500 border-t-transparent rounded-full"/>
                            Querying live Google endpoints...
                        </div>
                    )}

                    {!loading && !videos && !error && (
                        <div className={`text-center py-20 ${mt}`}>
                            <p className="text-lg">Enter a valid YouTube handle above to run queries</p>
                            <p className="text-sm mt-1">Make sure you provided your API key inside Settings tab</p>
                        </div>
                    )}
                </div>
            </React.Fragment>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
