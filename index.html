<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Content Dashboard</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

    <style>
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .animate-fade-in{animation:fadeIn .4s ease-out}
        .dark-scroll::-webkit-scrollbar{height:6px;width:6px}
        .dark-scroll::-webkit-scrollbar-track{background:transparent}
        .dark-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
        .dark-scroll{scrollbar-width:thin;scrollbar-color:#334155 transparent}

        .light-scroll::-webkit-scrollbar{height:6px;width:6px}
        .light-scroll::-webkit-scrollbar-track{background:transparent}
        .light-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        .light-scroll{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}

        .console-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease-out,opacity .25s ease-out;opacity:0}
        .console-wrap.open{grid-template-rows:1fr;opacity:1}
        .console-inner{overflow:hidden}

        input[type=range].scale-slider{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer}
        input[type=range].scale-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer}
        input[type=range].scale-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;cursor:pointer;border:none}
        .dark input[type=range].scale-slider{background:#334155}
        .dark input[type=range].scale-slider::-webkit-slider-thumb{background:#10b981}
        .dark input[type=range].scale-slider::-moz-range-thumb{background:#10b981}
        html:not(.dark) input[type=range].scale-slider{background:#cbd5e1}
        html:not(.dark) input[type=range].scale-slider::-webkit-slider-thumb{background:#059669}
        html:not(.dark) input[type=range].scale-slider::-moz-range-thumb{background:#059669}

        html.dark, html.dark body { background:#020617 !important; color:#f1f5f9 !important; color-scheme: dark; }
        html.dark table { color:#e2e8f0; }
        html.dark table td { color:inherit; }
        html.dark table th { color:#94a3b8; }
    </style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    const LS_P = 'yt-dashboard-prefs';
    const lp = () => { try { return JSON.parse(localStorage.getItem(LS_P)) || {}; } catch { return {}; } };
    const sp = p => { try { localStorage.setItem(LS_P, JSON.stringify(p)); } catch {} };

    // --- Data Storage ---
    const getCache = (channelId) => {
        try { return JSON.parse(localStorage.getItem(`yt-data-${channelId}`)) || null; } catch { return null; }
    };
    const setCache = (channelId, data) => {
        try { localStorage.setItem(`yt-data-${channelId}`, JSON.stringify(data)); } catch {}
    };

    const getMetaMap = () => {
        try { return JSON.parse(localStorage.getItem(`yt-meta-map`)) || {}; } catch { return {}; }
    };
    const saveMetaMap = (handle, meta) => {
        try {
            const map = getMetaMap();
            map[handle] = meta;
            localStorage.setItem(`yt-meta-map`, JSON.stringify(map));
        } catch {}
    };

    const sliderToScale = v => 0.7 + (v / 100) * 0.8;
    const DEFAULT_SCALE_SLIDER = 50;

    const App = () => {
        const prefs = useMemo(() => lp(), []);

        // Учитываем настройки, включая сохраненные фильтры и сортировку
        const [apiKey, setApiKey] = useState(prefs.apiKey || '');
        const [channelUrl, setChannelUrl] = useState(prefs.channelUrl || 'https://www.youtube.com/@InnerCircleTrader');
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [dark, setDark] = useState(prefs.dark !== false);
        const [scaleSlider, setScaleSlider] = useState(prefs.scaleSlider ?? DEFAULT_SCALE_SLIDER);

        const [videos, setVideos] = useState(null);
        const [currentChannelId, setCurrentChannelId] = useState(null);
        const [showSettings, setShowSettings] = useState(!prefs.apiKey);
        const [logs, setLogs] = useState([]);
        const [editNoteUrl, setEditNoteUrl] = useState(null);
        const [editNoteText, setEditNoteText] = useState('');

        // Persistent Filters & Sort
        const [sortConfig, setSortConfig] = useState(prefs.sortConfig || { key: 'datetime', direction: 'desc' });
        const [filters, setFilters] = useState(prefs.filters || { datetime: '', type: '', name: '', url: '', status: '', note: '' });

        const scale = sliderToScale(scaleSlider);
        const log = msg => setLogs(p => [...p.slice(-19), msg]);
        const isInitialMount = useRef(true);

        // Сохраняем все состояния UI и настроек в кэш приложения при любом их изменении
        useEffect(() => {
            sp({ apiKey, channelUrl, dark, scaleSlider, sortConfig, filters });
        }, [apiKey, channelUrl, dark, scaleSlider, sortConfig, filters]);

        useEffect(() => {
            document.documentElement.classList.toggle('dark', dark);
            const bg = dark ? '#020617' : '#f8fafc';
            const text = dark ? '#f1f5f9' : '#0f172a';
            document.documentElement.style.backgroundColor = bg;
            document.documentElement.style.color = text;
            document.body.style.backgroundColor = bg;
            document.body.style.color = text;
        }, [dark]);

        const extractUsername = (url) => {
            const match = url.match(/@([a-zA-Z0-9_\-\.]+)/);
            return match ? match[1] : url.trim();
        };

        const handleFetch = async (mode = 'load') => {
            // Защита: не блокируем авто-загрузку из кэша, если нет API ключа
            if (!apiKey.trim() && mode !== 'load') {
                setError("Google API Key is required for fetching new data. Please check settings.");
                setShowSettings(true);
                return;
            }
            if (!channelUrl.trim()) return;

            setLoading(true);
            setError(null);

            // Очищаем логи только если это ручное действие
            if (mode !== 'load') setLogs([]);

            const handle = extractUsername(channelUrl);
            let meta = getMetaMap()[handle];

            try {
                // 1. Разрешение метаданных (Если нет кэша или запрошен полный сброс)
                if (!meta || mode === 'refresh') {
                    if (!apiKey.trim()) {
                        if (mode === 'load') {
                            setLoading(false);
                            return; // Молча выходим, так как нужен ключ для первого поиска
                        }
                    }

                    log(`🔍 API: Resolving channel metadata: @${handle}`);
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(handle)}&key=${apiKey}`;
                    const sRes = await fetch(searchUrl);
                    if (!sRes.ok) throw new Error(`Search API error. Status: ${sRes.status}`);
                    const sData = await sRes.json();

                    if (!sData.items || sData.items.length === 0) throw new Error(`Channel @${handle} not found.`);
                    const channelId = sData.items[0].id.channelId;

                    const chDetailsUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&id=${channelId}&key=${apiKey}`;
                    const chRes = await fetch(chDetailsUrl);
                    const chData = await chRes.json();

                    meta = {
                        channelId: channelId,
                        title: chData.items[0].snippet.title,
                        uploadsPlaylistId: chData.items[0].contentDetails.relatedPlaylists.uploads
                    };
                    saveMetaMap(handle, meta);
                } else if (mode !== 'load') {
                    log(`⚡ Resolved @${handle} metadata from local map.`);
                }

                setCurrentChannelId(meta.channelId);
                const cachedData = getCache(meta.channelId) || [];

                // 2. РЕЖИМ LOAD (Чтение кэша без запросов)
                if (mode === 'load') {
                    if (cachedData.length > 0) {
                        log(`📦 Auto-loaded ${cachedData.length} items with preserved watch statuses.`);
                        setVideos(cachedData);
                        setLoading(false);
                        return;
                    } else {
                        // Если кэша нет, переходим в режим refresh (если есть ключ)
                        if (apiKey.trim()) mode = 'refresh';
                        else { setLoading(false); return; }
                    }
                }

                // 3. РЕЖИМ UPDATE / REFRESH
                log(`📥 Syncing ${mode === 'update' ? 'new videos only' : 'entire archive'} from Uploads Playlist...`);
                let newItems = [];
                let nextPageToken = '';
                let pageCount = 0;
                let hitExisting = false;

                do {
                    const playlistItemsUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${meta.uploadsPlaylistId}&maxResults=50&key=${apiKey}${nextPageToken ? `&pageToken=${nextPageToken}` : ''}`;
                    const pRes = await fetch(playlistItemsUrl);
                    if (!pRes.ok) throw new Error(`Playlist API Error. Status: ${pRes.status}`);
                    const pData = await pRes.json();

                    if (pData.items) {
                        for (let item of pData.items) {
                            const videoId = item.snippet.resourceId.videoId;
                            // Update mode logic: stop if video is already known
                            if (mode === 'update' && cachedData.some(v => v.url.includes(videoId))) {
                                hitExisting = true;
                                break;
                            }
                            newItems.push(item);
                        }
                    }

                    if (hitExisting) break; // Прерываем итерацию страниц, так как дошли до старых видео

                    nextPageToken = pData.nextPageToken;
                    pageCount++;
                    log(`⏳ Synced page ${pageCount} (Found ${newItems.length} new records)...`);
                } while (nextPageToken);

                // --- САМЫЙ ВАЖНЫЙ БЛОК: ЗАЩИТА ТВОИХ ОТМЕТОК ---
                // Создаем быструю карту всех твоих статусов и заметок из кэша
                const statusMap = {};
                const noteMap = {};
                cachedData.forEach(v => {
                    if (v.status && v.status !== 'unwatched') {
                        statusMap[v.url] = v.status;
                    }
                    noteMap[v.url] = v.note || '';
                });

                // Присваиваем статусы новым или обновленным видео
                const processedNew = newItems.map(item => {
                    const title = item.snippet.title;
                    const videoId = item.snippet.resourceId.videoId;
                    const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;

                    let type = 'Video';
                    if (title.toLowerCase().includes('#shorts') || title.toLowerCase().includes('shorts')) type = 'Shorts';
                    else if (title.toLowerCase().includes('live') || title.toLowerCase().includes('stream')) type = 'Live';

                    return {
                        datetime: item.snippet.publishedAt,
                        type,
                        name: title,
                        url: videoUrl,
                        status: statusMap[videoUrl] || 'unwatched', // <-- Бережное восстановление твоих отметок
                        note: noteMap[videoUrl] || ''
                    };
                });

                let finalData;
                if (mode === 'update') {
                    finalData = [...processedNew, ...cachedData]; // Приклеиваем новые сверху
                    log(`✅ Smart Update complete. Merged ${processedNew.length} new items. Total: ${finalData.length}`);
                } else {
                    finalData = processedNew; // Полная замена (статусы всё равно сохранены благодаря statusMap)
                    log(`✅ Full Refresh complete. Resynced ${finalData.length} items while preserving your progress.`);
                }

                setVideos(finalData);
                setCache(meta.channelId, finalData); // Сохраняем в кэш обновленный массив
            } catch (err) {
                log(`❌ Error: ${err.message}`);
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };

        // --- Auto-Load Hook ---
        // Load cached data on open, then check for updates
        useEffect(() => {
            if (isInitialMount.current) {
                isInitialMount.current = false;
                const init = async () => {
                    if (channelUrl) {
                        await handleFetch('load');
                        if (apiKey.trim()) {
                            await handleFetch('update');
                        }
                    }
                };
                init();
            }
            // eslint-disable-next-line react-hooks/exhaustive-deps
        }, []);

        const saveNote = (url, text) => {
            if (!currentChannelId || !videos) return;
            const next = videos.map(v => (v.url === url ? { ...v, note: text || '' } : v));
            setVideos(next);
            setCache(currentChannelId, next);
            setEditNoteUrl(null);
            setEditNoteText('');
        };

        // --- Status Toggle ---
        const toggleStatus = (url) => {
            if (!currentChannelId || !videos) return;

            const nextVideos = videos.map(v => {
                if (v.url === url) {
                    const current = v.status || 'unwatched';
                    let nextStatus = 'unwatched';
                    if (current === 'unwatched') nextStatus = 'watching';
                    else if (current === 'watching') nextStatus = 'watched';
                    return { ...v, status: nextStatus };
                }
                return v;
            });

            setVideos(nextVideos);
            setCache(currentChannelId, nextVideos); // Мгновенное сохранение в локальное хранилище
        };

        // --- CSV Export ---
        const handleExportCSV = () => {
            if (!processedVideos || processedVideos.length === 0) return;

            const headers = ['Date', 'Time', 'Type', 'Status', 'Name', 'URL'];
            const rows = processedVideos.map(v => {
                const safeName = v.name.replace(/"/g, '""');
                const d = new Date(v.datetime);
                const dateStr = d.toISOString().split('T')[0];
                const timeStr = d.toISOString().split('T')[1].replace('Z', '');
                return `"${dateStr}","${timeStr}","${v.type}","${v.status || 'unwatched'}","${safeName}","${v.url}"`;
            });

            const csvContent = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `yt_export_${new Date().getTime()}.csv`;
            link.click();
        };

        // --- Sort & Filter Actions ---
        const requestSort = (key) => {
            let direction = 'asc';
            if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
            setSortConfig({ key, direction });
        };

        const handleFilterChange = (key, value) => {
            setFilters(prev => ({ ...prev, [key]: value }));
        };

        // --- Core Processed Data ---
        const processedVideos = useMemo(() => {
            if (!videos) return [];
            let result = [...videos];

            // Применяем фильтры
            Object.keys(filters).forEach(key => {
                const filterVal = filters[key].toLowerCase();
                if (filterVal) {
                    result = result.filter(v => {
                        const cellVal = String(v[key] || (key === 'status' ? 'unwatched' : '')).toLowerCase();
                        return cellVal.includes(filterVal);
                    });
                }
            });

            // Применяем сортировку
            result.sort((a, b) => {
                const aVal = a[sortConfig.key] || '';
                const bVal = b[sortConfig.key] || '';
                if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            return result;
        }, [videos, sortConfig, filters]);

        // --- Visual Helpers ---
        const getBadgeStyle = (type) => {
            if (type === 'Live') return dark ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-red-50 text-red-700 border-red-200';
            if (type === 'Shorts') return dark ? 'bg-purple-500/10 text-purple-400 border-purple-500/20' : 'bg-purple-50 text-purple-700 border-purple-200';
            return dark ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 'bg-blue-50 text-blue-700 border-blue-200';
        };

        const getStatusDisplay = (status) => {
            if (status === 'watched') return { label: '🟢 Watched', cls: 'text-emerald-500 bg-emerald-500/10 border-emerald-500/20 shadow-sm shadow-emerald-500/10' };
            if (status === 'watching') return { label: '🟡 Watching', cls: 'text-yellow-500 bg-yellow-500/10 border-yellow-500/20 shadow-sm shadow-yellow-500/10' };
            return { label: '⚪️ Unwatched', cls: dark ? 'text-slate-400 bg-slate-800 border-slate-700' : 'text-slate-500 bg-slate-100 border-slate-200' };
        };

        const formatDate = (isoStr) => {
            return new Date(isoStr).toLocaleString('en-US', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false
            });
        };

        // --- Tailwind Theme Classes ---
        const bg = dark ? 'bg-slate-950/95 text-slate-100' : 'bg-white/95 text-slate-900';
        const bdr = dark ? 'border-slate-800' : 'border-slate-200';
        const card = dark ? 'bg-slate-800 border-slate-600 text-slate-100' : 'bg-white border-slate-200 text-slate-900 shadow-sm';
        const inp = dark ? 'bg-slate-800 border-slate-700 text-emerald-400' : 'bg-slate-50 border-slate-300 text-emerald-700';
        const inpFilter = dark ? 'bg-slate-900 border-slate-700 text-slate-200' : 'bg-white border-slate-300 text-slate-800';
        const mt = dark ? 'text-slate-400' : 'text-slate-500';
        const t1 = dark ? 'text-slate-100' : 'text-slate-800';
        const sB = dark ? 'bg-slate-800' : 'bg-white';
        const hR = dark ? 'hover:bg-slate-700/20' : 'hover:bg-slate-50';
        const scCls = dark ? 'dark-scroll' : 'light-scroll';

        const tblFs = `${Math.round(14 * scale)}px`;
        const tblHFs = `${Math.round(11 * scale)}px`;
        const tblCellPy = `${Math.round(10 * scale)}px`;

        const Th = ({ label, columnKey, width }) => (
            <th className={`px-4 align-top ${width || ''}`} style={{ fontSize: tblHFs, paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                <div className="flex flex-col gap-1.5">
                    <button
                        onClick={() => requestSort(columnKey)}
                        title={`Sort by ${label}`}
                        className={`flex items-center gap-1 font-semibold uppercase tracking-wider text-left transition-colors hover:text-emerald-500 ${sortConfig.key === columnKey ? 'text-emerald-500' : mt}`}
                    >
                        {label}
                        <span className="text-[10px]">
                            {sortConfig.key === columnKey ? (sortConfig.direction === 'asc' ? '▲' : '▼') : '↕'}
                        </span>
                    </button>
                    <input
                        type="text"
                        placeholder="Filter..."
                        title={`Filter by ${label}`}
                        value={filters[columnKey]}
                        onChange={(e) => handleFilterChange(columnKey, e.target.value)}
                        className={`w-full px-2 py-1 text-[10px] rounded border focus:outline-none focus:border-emerald-500 transition-colors ${inpFilter}`}
                    />
                </div>
            </th>
        );

        return (
            <React.Fragment>
                {/* Navbar */}
                <div className={`sticky top-0 z-50 ${bg} backdrop-blur-md border-b ${bdr}`}>
                    <div className="px-4 xl:px-8">
                        <div className="flex flex-wrap items-center gap-3 py-3">
                            <button
                                onClick={() => setShowSettings(!showSettings)}
                                title="Settings"
                                className={`flex-shrink-0 text-sm px-2 py-1.5 rounded transition-colors ${showSettings ? (dark ? 'bg-slate-700 text-slate-300' : 'bg-slate-200 text-slate-600') : (dark ? 'text-slate-600 hover:text-slate-400' : 'text-slate-400 hover:text-slate-600')}`}
                            >
                                ⚙️
                            </button>
                            <div className="flex gap-1.5 flex-shrink-0">
                                <div className={`h-2.5 w-2.5 rounded-full ${apiKey ? 'bg-emerald-500' : 'bg-red-500'}`} title={apiKey ? "API Key Configured" : "API Key Missing"}/>
                            </div>

                            <div className="flex-1 min-w-[200px]">
                                <input
                                    type="text"
                                    title="Channel link or @handle"
                                    value={channelUrl}
                                    onChange={e => setChannelUrl(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleFetch('load')}
                                    placeholder="YouTube Channel link or handle (@InnerCircleTrader)..."
                                    className={`w-full ${inp} border rounded-lg px-3 py-2 font-mono font-medium text-sm focus:outline-none focus:border-emerald-500 transition-colors`}
                                />
                            </div>

                            {/* Action Control Panel */}
                            <div className="flex items-center gap-2">
                                <button onClick={() => handleFetch('update')} disabled={loading || !channelUrl} title="Update" className={`flex-shrink-0 text-lg font-bold w-9 h-9 rounded-lg border transition-all shadow-sm flex items-center justify-center ${dark ? 'border-blue-500/50 bg-blue-500/10 text-blue-400 hover:bg-blue-500/20' : 'border-blue-300 bg-blue-50 text-blue-600 hover:bg-blue-100'} disabled:opacity-40`}>
                                    ⬇
                                </button>

                                <button onClick={() => handleFetch('refresh')} disabled={loading || !channelUrl} title="Refresh / Reload" className={`flex-shrink-0 text-lg w-9 h-9 rounded-lg border transition-all ${dark ? 'border-slate-700 hover:bg-slate-800 text-slate-300' : 'border-slate-300 hover:bg-slate-100 text-slate-600'} disabled:opacity-40 flex items-center justify-center`}>
                                    🔄
                                </button>
                            </div>

                            <button onClick={handleExportCSV} disabled={!videos || videos.length === 0} title="Export CSV" className={`flex-shrink-0 text-lg w-9 h-9 rounded-lg border transition-all ${dark ? 'border-slate-700 hover:bg-slate-800 text-emerald-400' : 'border-slate-300 hover:bg-slate-100 text-emerald-600'} disabled:opacity-40 flex items-center justify-center`}>
                                📥
                            </button>

                            <button onClick={() => setDark(!dark)} title={dark ? "Switch to light mode" : "Switch to dark mode"} className={`flex-shrink-0 text-sm px-2 py-1.5 rounded transition-colors ${dark ? 'text-yellow-400 hover:text-yellow-300' : 'text-slate-500 hover:text-slate-700'}`}>
                                {dark ? '☀' : '🌙'}
                            </button>
                        </div>

                        {/* Event Logger Console */}
                        <div className={`console-wrap ${logs.length > 0 ? 'open' : ''}`}>
                            <div className="console-inner">
                                <div className="pb-2 -mt-1">
                                    <div className={`${dark ? 'bg-slate-950 border-slate-800' : 'bg-slate-100 border-slate-200'} border rounded-lg px-3 py-1.5 font-mono text-[11px] overflow-x-auto whitespace-nowrap ${scCls}`}>
                                        {logs.map((l, i) => (
                                            <span key={i}>
                                                {i > 0 && <span className={dark ? 'text-slate-700' : 'text-slate-300'}> · </span>}
                                                <span className={l.startsWith('✅') || l.startsWith('📦') ? 'text-emerald-500' : l.startsWith('⚡') ? 'text-blue-400' : l.startsWith('❌') ? 'text-red-500' : mt}>{l}</span>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                {/* Main Workspace Area */}
                <div className="px-4 xl:px-8 py-6">
                    {/* Tutorial & Settings Drawer */}
                    {showSettings && (
                        <div className={`${card} border rounded-xl p-5 mb-6 text-sm max-w-3xl mx-auto space-y-4 animate-fade-in`}>
                            <h3 className="font-bold text-base flex items-center gap-2 border-b pb-2 border-slate-700/40">📋 Core Architecture & Setup</h3>
                            <div className="space-y-3 text-xs text-slate-400">
                                <div><strong className="text-emerald-500">Auto-Load & Persistence:</strong> Your sorting preferences, column filters, and video watch statuses are securely saved directly in your browser. Upon opening the page, it automatically loads your exact previous state with zero API cost.</div>
                                <div><strong className="text-blue-400">⚡ Update Mode:</strong> Safely fetches only new releases from YouTube, instantly appending them to your database without overwriting your progress.</div>
                                <div><strong className={t1}>Watch Status Tracker:</strong> Click inside the Status column to mark learning progress: Unwatched ➔ Watching ➔ Watched.</div>
                                <hr className="border-slate-700/40" />
                                <p>Insert your Google Cloud YouTube Data API v3 Key below to activate network syncing:</p>
                            </div>
                            <div className="pt-2">
                                <input
                                    type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
                                    placeholder="AIzaSy..." className={`w-full ${inp} border rounded-lg px-3 py-2 font-mono text-xs focus:outline-none focus:border-emerald-500 transition-colors`}
                                />
                            </div>

                            {/* API Example / Extra Fields Info */}
                            <div className="pt-4 border-t border-slate-700/30">
                                <h4 className="font-semibold text-sm mb-2">📡 Other YouTube Data API v3 Data</h4>
                                <p className="text-[11px] text-slate-400 mb-3">Below is a single item from the uploads playlist response. The API also provides <strong>video statistics</strong> (viewCount, likeCount, commentCount), <strong>contentDetails</strong> (duration, definition, caption), <strong>snippet thumbnails</strong>, tags, category, and live broadcast info.</p>
                                <pre className={`bg-slate-950 text-emerald-300 text-[10px] rounded-lg p-3 overflow-x-auto whitespace-pre-wrap border border-slate-700 font-mono`}>
{`{
  "kind": "youtube#playlistItem",
  "snippet": {
    "publishedAt": "2024-03-15T14:30:00Z",
    "channelId": "UC...",
    "title": "Market Update - March 2024",
    "description": "In this video...",
    "thumbnails": {
      "default":  {"url":"https://...","width":120,"height":90},
      "medium":   {"url":"https://...","width":320,"height":180},
      "high":     {"url":"https://...","width":480,"height":360}
    },
    "resourceId": {"kind":"youtube#video","videoId":"dQw4w9WgXcQ"},
    "videoOwnerChannelTitle":"Channel Name",
    "videoOwnerChannelId":"UC...",
    "playlistId":"UU...",
    "position":0
  },
  "contentDetails": {
    "videoId":"dQw4w9WgXcQ",
    "startAt":"0",
    "endAt":null
  }
}`}
                                </pre>
                                <ul className="text-[11px] text-slate-400 mt-3 space-y-1 list-disc pl-4">
                                    <li><strong>snippet</strong>: title, description, publishedAt, thumbnails (default/medium/high), tags, categoryId, liveBroadcastContent</li>
                                    <li><strong>contentDetails</strong>: videoId, duration, dimension (2d/3d), definition (hd/sd), caption, licensedContent</li>
                                    <li><strong>statistics</strong> (via <code>videos.list</code>): viewCount, likeCount, favoriteCount, commentCount</li>
                                    <li><strong>status</strong>: uploadStatus, privacyStatus, embeddable, publicStatsViewable</li>
                                </ul>
                            </div>
                        </div>
                    )}

                    {error && (
                        <div className="bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-3 rounded-xl mb-6 text-sm flex items-start gap-2 animate-fade-in max-w-3xl mx-auto">
                            <span className="flex-shrink-0 mt-0.5">✕</span><span className="flex-1">{error}</span>
                        </div>
                    )}

                    {/* Table View Component */}
                    {videos && !loading && (
                        <div className="space-y-6 animate-fade-in">
                            <div className={`${card} border rounded-xl overflow-hidden shadow-lg`}>
                                <div className={`px-4 py-3 border-b ${dark ? 'border-slate-700/50' : 'border-slate-200'} bg-gradient-to-r ${dark ? 'from-slate-900/30 to-slate-900/10' : 'from-slate-50 to-slate-100/50'} flex items-center justify-between gap-4`}>
                                    <h3 className="font-bold text-emerald-500" style={{ fontSize: `${Math.round(16 * scale)}px` }}>
                                        📋 Channel Inventory ({processedVideos.length} / {videos.length})
                                    </h3>
                                    <div className="flex items-center gap-2 flex-shrink-0">
                                        <span className={`text-[10px] ${mt}`}>A</span>
                                        <input
                                            type="range" min="0" max="100" value={scaleSlider} onChange={e => setScaleSlider(Number(e.target.value))}
                                            className="scale-slider w-20" title={`Scale: ${Math.round(scale * 100)}%`}
                                        />
                                        <span className={`text-xs font-bold ${mt}`}>A</span>
                                    </div>
                                </div>

                                {/* Desktop Fully Sortable Table */}
                                <div className={`hidden md:block overflow-x-auto ${scCls}`}>
                                    <table className="w-full text-left border-collapse" style={{ fontSize: tblFs }}>
                                        <thead>
                                        <tr className={dark ? 'bg-slate-900/50' : 'bg-slate-50'}>
                                            <Th label="Datetime" columnKey="datetime" width="w-44" />
                                            <Th label="Type" columnKey="type" width="w-28" />
                                            <Th label="Name" columnKey="name" />
                                            <Th label="URL" columnKey="url" width="w-24" />
                                            <Th label="Status" columnKey="status" width="w-36" />
                                            <Th label="Note" columnKey="note" width="w-48" />
                                        </tr>
                                        </thead>
                                        <tbody className={`divide-y ${dark ? 'divide-slate-700/30' : 'divide-slate-100'}`}>
                                        {processedVideos.map((v, i) => {
                                            const statusMeta = getStatusDisplay(v.status || 'unwatched');
                                            return (
                                                <tr key={i} className={`${hR} transition-colors group`}>
                                                    <td className={`px-4 font-mono ${mt} sticky left-0 z-10 ${sB} whitespace-nowrap`} style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                        {formatDate(v.datetime)}
                                                    </td>
                                                    <td className="px-4 whitespace-nowrap" style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                        <span className={`px-2 py-0.5 text-[11px] font-bold border rounded-md ${getBadgeStyle(v.type)}`}>
                                                            {v.type}
                                                        </span>
                                                    </td>
                                                    <td className={`px-4 font-medium ${t1} max-w-sm xl:max-w-xl truncate`} style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }} title={v.name}>
                                                        {v.name}
                                                    </td>
                                                    <td className="px-4 whitespace-nowrap text-right" style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                        <a href={v.url} target="_blank" rel="noreferrer" className="text-emerald-500 hover:text-emerald-400 font-bold transition-colors">
                                                            Open ↗
                                                        </a>
                                                    </td>
                                                    <td className="px-4 whitespace-nowrap" style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                        <button
                                                            onClick={() => toggleStatus(v.url)}
                                                            className={`px-3 py-1 text-[11px] font-bold border rounded-md transition-all active:scale-95 w-full text-left ${statusMeta.cls}`}
                                                            title="Click to track learning progress"
                                                        >
                                                            {statusMeta.label}
                                                        </button>
                                                    </td>
                                                    <td className="px-4 whitespace-nowrap" style={{ paddingTop: tblCellPy, paddingBottom: tblCellPy }}>
                                                        {editNoteUrl === v.url ? (
                                                            <input
                                                                type="text"
                                                                autoFocus
                                                                value={editNoteText}
                                                                onChange={e => setEditNoteText(e.target.value)}
                                                                onBlur={() => saveNote(v.url, editNoteText)}
                                                                onKeyDown={e => { if (e.key === 'Enter') saveNote(v.url, editNoteText); if (e.key === 'Escape') { setEditNoteUrl(null); setEditNoteText(''); } }}
                                                                className={`w-full px-2 py-1 text-[11px] rounded border focus:outline-none focus:border-emerald-500 transition-colors ${inpFilter}`}
                                                                title="Edit note"
                                                            />
                                                        ) : (
                                                            <button
                                                                onClick={() => { setEditNoteUrl(v.url); setEditNoteText(v.note || ''); }}
                                                                title={v.note ? v.note : 'Add note'}
                                                                className="text-left w-full truncate text-[11px] px-2 py-1 rounded border hover:bg-emerald-50 hover:border-emerald-300 dark:hover:bg-emerald-900/30 dark:hover:border-emerald-700 transition-colors"
                                                            >
                                                                <span className="inline-flex items-center gap-1">
                                                                    {(v.note && v.note.trim()) ? (
                                                                        <span className={`${dark ? 'text-emerald-400' : 'text-emerald-700'}`}>
                                                                            {v.note.length > 30 ? v.note.slice(0, 30) + '…' : v.note}
                                                                        </span>
                                                                    ) : (
                                                                        <span className={`${dark ? 'text-slate-500' : 'text-slate-400'}`}>
                                                                            ✏️ Add note
                                                                        </span>
                                                                    )}
                                                                </span>
                                                            </button>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {processedVideos.length === 0 && (
                                            <tr>
                                                <td colSpan="6" className={`text-center py-12 ${mt}`}>No data matched the current column filters.</td>
                                            </tr>
                                        )}
                                        </tbody>
                                    </table>
                                </div>

                                {/* Mobile Optimised Stack Cards */}
                                <div className="block md:hidden p-4 space-y-3">
                                    <div className="pb-2 flex gap-2 overflow-x-auto">
                                        <input type="text" placeholder="Filter Name..." title="Filter by Name" value={filters.name} onChange={e => handleFilterChange('name', e.target.value)} className={`flex-1 min-w-[120px] px-3 py-2 text-xs rounded border ${inpFilter}`} />
                                        <input type="text" placeholder="Filter Status..." title="Filter by Status" value={filters.status} onChange={e => handleFilterChange('status', e.target.value)} className={`w-28 px-3 py-2 text-xs rounded border ${inpFilter}`} />
                                    </div>
                                    {processedVideos.map((v, i) => {
                                        const statusMeta = getStatusDisplay(v.status || 'unwatched');
                                        return (
                                            <div key={i} className={`border rounded-xl p-4 ${dark ? 'bg-slate-900/40 border-slate-700/60' : 'bg-slate-50 border-slate-200'} space-y-3`}>
                                                <div className="flex items-center justify-between gap-2">
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-2 py-0.5 text-[10px] font-bold border rounded-md ${getBadgeStyle(v.type)}`}>{v.type}</span>
                                                        <span className="text-[11px] font-mono opacity-60">{formatDate(v.datetime)}</span>
                                                    </div>
                                                </div>
                                                <h4 className={`font-semibold text-sm ${t1} line-clamp-2`}>{v.name}</h4>
                                                {v.note ? (
                                                    <div className="text-[11px] text-slate-400 truncate">
                                                        📝 {v.note.length > 40 ? v.note.slice(0, 40) + '…' : v.note}
                                                    </div>
                                                ) : (
                                                    <button onClick={() => { setEditNoteUrl(v.url); setEditNoteText(v.note || ''); }} className="text-[11px] text-slate-400 hover:text-emerald-500 transition-colors" title="Add note">✏️ Add note</button>
                                                )}
                                                <div className="pt-2 flex items-center justify-between gap-2">
                                                    <button onClick={() => toggleStatus(v.url)} title="Toggle watch status" className={`flex-1 text-center text-xs py-2 rounded-lg font-bold border transition-all ${statusMeta.cls}`}>
                                                        {statusMeta.label}
                                                    </button>
                                                    <a href={v.url} target="_blank" rel="noreferrer" className="flex-1 text-center bg-emerald-500 hover:bg-emerald-400 text-white text-xs py-2 rounded-lg font-bold transition-all">
                                                        Watch ↗
                                                    </a>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className={`text-center py-20 ${mt} flex items-center justify-center gap-3`}>
                            <div className="animate-spin h-5 w-5 border-2 border-emerald-500 border-t-transparent rounded-full"/>
                            Synchronizing local datastore with YouTube API...
                        </div>
                    )}

                    {!loading && !videos && !error && (
                        <div className={`text-center py-20 ${mt}`}>
                            <p className="text-lg">Paste your API Key in Settings and click Refresh to start.</p>
                        </div>
                    )}
                </div>
            </React.Fragment>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
